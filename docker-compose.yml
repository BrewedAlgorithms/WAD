version: "3.9"

services:
  mongo:
    image: mongo:6
    container_name: research_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  python:
    build:
      context: ./microservices_python
    container_name: research_python
    restart: unless-stopped
    environment:
      - SERVICE_HOST=0.0.0.0
      - SERVICE_PORT=5001
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    ports:
      - "5001:5001"
    depends_on:
      - mongo

  backend:
    build:
      context: ./backend
    container_name: research_backend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - MONGODB_URI=mongodb://mongo:27017/research_companion
      - PYTHON_SERVICE_URL=http://python:5001
      - JWT_SECRET=${JWT_SECRET:-change-me}
      - JWT_EXPIRES_IN=7d
      - RATE_LIMIT_WINDOW_MS=900000
      - RATE_LIMIT_MAX_REQUESTS=100
      - LOG_LEVEL=info
      - UPLOAD_DIR=/app/uploads
      - MAX_FILE_SIZE=10485760
      # Optional Cloudinary envs
      - CLOUDINARY_CLOUD_NAME
      - CLOUDINARY_API_KEY
      - CLOUDINARY_API_SECRET
    volumes:
      - backend_uploads:/app/uploads
      - backend_logs:/app/logs
    ports:
      - "3003:3000"
    depends_on:
      - mongo
      - python

  frontend:
    build:
      context: ./frontend
    container_name: research_frontend
    restart: unless-stopped
    ports:
      - "3001:80"
    depends_on:
      - backend

volumes:
  mongo_data:
  backend_uploads:
  backend_logs:


