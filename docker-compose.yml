version: "3.9"

services:
  mongo:
    image: mongo:6
    container_name: research_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  python:
    build:
      context: ./microservices_python
    container_name: research_python
    restart: unless-stopped
    env_file:
      - ./microservices_python/.env
    environment:
      - SERVICE_HOST=0.0.0.0
      - SERVICE_PORT=5001
    ports:
      - "5001:5001"
    depends_on:
      - mongo

  backend:
    build:
      context: ./backend
    container_name: research_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=production
      - PORT=3000
      # Override service URLs for Docker network
      - MONGODB_URI=mongodb://mongo:27017/research_companion
      - PYTHON_SERVICE_URL=http://python:5001
      # Ensure upload dir exists inside container
      - UPLOAD_DIR=/app/uploads
    volumes:
      - backend_uploads:/app/uploads
      - backend_logs:/app/logs
    ports:
      - "3003:3000"
    depends_on:
      - mongo
      - python

  frontend:
    build:
      context: ./frontend
    container_name: research_frontend
    restart: unless-stopped
    ports:
      - "3001:80"
    depends_on:
      - backend

volumes:
  mongo_data:
  backend_uploads:
  backend_logs:


